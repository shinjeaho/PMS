<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 작성</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='doc_editor.css') }}">
</head>

<body data-author-name="{{ session.get('user', {}).get('name', '') | e }}"
    data-department="{{ session.get('user', {}).get('department', '') | e }}">
    <script>
        // 테스트 버전: 기능 미구현(동작은 JS에서 비활성화)
        window.DOC_EDITOR_TEST_MODE = true;
    </script>
    <div class="doc-app">
        <header class="doc-header">
            <div class="doc-meta-row">
                <div class="doc-meta-item">
                    <span class="doc-meta-label">작성일</span>
                    <span class="doc-meta-value" id="createdAt">-</span>
                </div>
                <div class="doc-meta-item doc-meta-right">
                    <span class="doc-meta-label">작성자</span>
                    <span class="doc-meta-value" id="authorName">-</span>
                </div>
            </div>
            <div class="doc-meta-row">
                <div class="doc-meta-item">
                    <span class="doc-meta-label">사업번호</span>
                    <input class="doc-meta-input" id="projectNumber" type="text" value="-">
                    <p style="font-size: 11px; color: #666;">* 사업과 관련되지 않은 경우 '-' 또는 공란으로 입력</p>
                </div>
                
            </div>

            <div class="doc-title-row">
                                <label class="doc-control-label" for="docTitle">제 목</label>
                <input id="docTitle" class="doc-title-input" type="text" placeholder="제목을 입력하세요">
            </div>

            <div class="doc-toolbar" id="toolbar" role="toolbar" aria-label="문서 편집 툴바">
                <div class="tool-left">
                    <div class="tool-group">
                    <button class="tool-btn" type="button" title="실행취소" aria-label="실행취소">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M7 7H3V3" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M3 7c2-3 5-5 9-5a9 9 0 1 1-6 15" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="다시실행" aria-label="다시실행">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M17 7h4V3" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M21 7c-2-3-5-5-9-5a9 9 0 1 0 6 15" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                </div>

                <div class="tool-sep" aria-hidden="true"></div>

                <div class="tool-group tool-group-wide">
                    <select class="tool-select" title="스타일">
                        <option value="">기본값</option>
                        <option value="p">본문</option>
                        <option value="h1">Heading 1</option>
                        <option value="h2">Heading 2</option>
                        <option value="h3">Heading 3</option>
                        <option value="h4">Heading 4</option>
                    </select>

                    <select class="tool-select" title="글꼴">
                        <option value="">맑은 고딕</option>
                        <option value="Malgun Gothic">맑은 고딕</option>
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Consolas">Consolas</option>
                    </select>

                    <div class="font-size-control">
                        <input class="tool-select font-input" title="글자 크기 (px)" inputmode="numeric"
                            aria-label="글자 크기">
                        <span class="font-unit">px</span>
                        <button type="button" class="tool-btn" title="크기 선택" aria-label="크기 선택">▾</button>
                        <div class="font-menu" aria-hidden="true"></div>
                    </div>
                </div>

                <div class="tool-sep" aria-hidden="true"></div>

                <div class="tool-group">
                    <button class="tool-btn" type="button" title="굵게" aria-label="굵게"><b>B</b></button>
                    <button class="tool-btn" type="button" title="기울임" aria-label="기울임"><i>I</i></button>
                    <button class="tool-btn" type="button" title="밑줄" aria-label="밑줄"><u>U</u></button>
                    <button class="tool-btn" type="button" title="취소선" aria-label="취소선"><span
                            style="text-decoration:line-through">S</span></button>
                    <label class="tool-color" title="글자색">
                        <input type="color" value="#111827" aria-label="글자색">
                    </label>
                </div>

                <div class="tool-sep" aria-hidden="true"></div>

                <div class="tool-group">
                    <button class="tool-btn" type="button" title="왼쪽 정렬" aria-label="왼쪽 정렬">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16M4 10h10M4 14h16M4 18h10" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="가운데 정렬" aria-label="가운데 정렬">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M6 6h12M4 10h16M6 14h12M4 18h16" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="오른쪽 정렬" aria-label="오른쪽 정렬">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16M10 10h10M4 14h16M10 18h10" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="양쪽 정렬" aria-label="양쪽 정렬">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16M4 10h16M4 14h16M4 18h16" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                </div>

                <div class="tool-sep" aria-hidden="true"></div>

                <div class="tool-group">
                    <button class="tool-btn" type="button" title="글머리" aria-label="글머리">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M9 6h12M9 12h12M9 18h12" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M4 6h.01M4 12h.01M4 18h.01" stroke="currentColor" stroke-width="4" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="번호 매기기" aria-label="번호 매기기">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10 6h10M10 12h10M10 18h10" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M4 7h2M4 13h2M4 19h2" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="내어쓰기" aria-label="내어쓰기">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16M4 10h10M4 14h16M4 18h10" fill="none" stroke="currentColor"
                                stroke-width="2" />
                            <path d="M8 12H4l2-2m-2 2 2 2" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="들여쓰기" aria-label="들여쓰기">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16M4 10h10M4 14h16M4 18h10" fill="none" stroke="currentColor"
                                stroke-width="2" />
                            <path d="M4 12h4l-2-2m2 2-2 2" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                </div>

                <div class="tool-sep" aria-hidden="true"></div>

                <div class="tool-group">
                    <button class="tool-btn" type="button" title="링크" aria-label="링크">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1" fill="none" stroke="currentColor"
                                stroke-width="2" />
                            <path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="링크 해제" aria-label="링크 해제">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1" fill="none" stroke="currentColor"
                                stroke-width="2" />
                            <path d="M3 21L21 3" fill="none" stroke="currentColor" stroke-width="2" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="이미지" aria-label="이미지">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 5h16v14H4z" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M8 11l2 2 3-3 5 5" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M9 8h.01" stroke="currentColor" stroke-width="4" />
                        </svg>
                    </button>
                    <button class="tool-btn" type="button" title="표 삽입" aria-label="표 삽입">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 6h16v12H4z" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M4 10h16M4 14h16M8 6v12M12 6v12M16 6v12" fill="none" stroke="currentColor"
                                stroke-width="2" />
                        </svg>
                    </button>
                </div>
                </div>
                <div class="tool-right">
                    <div class="tool-group">
                        <button class="tool-btn btn-primary" type="button" title="저장" aria-label="저장">저장</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="doc-body">
            <div class="paper-scroll">
                <div class="paper" id="editor" contenteditable="true" spellcheck="false">

                    <div class="paper-title" data-placeholder="문서 제목">회의록</div>

                    <table class="paper-table">
                        <colgroup>
                            <col style="width: 20%">
                            <col style="width: 30%">
                            <col style="width: 20%">
                            <col style="width: 30%">
                        </colgroup>
                        <tbody>
                            <tr>
                                <td class="locked" style="height: 35px;" contenteditable="false">일 시</td>
                                <td></td>
                                <td class="locked" style="height: 35px;" contenteditable="false">작성자</td>
                                <td id="authorCell"></td>
                            </tr>
                            <tr>
                                <td class="locked" style="height: 35px;" contenteditable="false">장 소</td>
                                <td colspan="3"></td>
                            </tr>
                            <tr>
                                <td class="locked" style="height: 35px;" contenteditable="false">참석자</td>
                                <td colspan="3"></td>
                            </tr>
                            <tr>
                                <td class="locked" style="height: 35px;" contenteditable="false">제 목</td>
                                <td colspan="3" id="meetingTitleCell"></td>
                            </tr>
                            <tr>
                                <td class="locked" contenteditable="false">회의내용</td>
                                <td colspan="3" style="height: 520px"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <input type="file" id="docImageFile" accept="image/*" style="display: none;">

    <!-- 표 우클릭 컨텍스트 메뉴 -->
    <div class="context-menu" id="tableContextMenu" aria-hidden="true">
        <button type="button" data-action="rowAddAbove">행 추가(위)</button>
        <button type="button" data-action="rowAddBelow">행 추가(아래)</button>
        <button type="button" data-action="rowDelete">행 삭제</button>
        <div class="context-sep"></div>
        <button type="button" data-action="colAddLeft">열 추가(왼쪽)</button>
        <button type="button" data-action="colAddRight">열 추가(오른쪽)</button>
        <button type="button" data-action="colDelete">열 삭제</button>
        <div class="context-sep"></div>
        <button type="button" data-action="rowHeight">행 높이...</button>
        <button type="button" data-action="colWidth">열 너비...</button>
        <label class="context-color">
            <span>열 배경색</span>
            <input type="color" id="tableContextColBg" value="#ffffff" aria-label="열 배경색">
        </label>
    </div>

    <!-- 새 표 모달 -->
    <div class="modal-overlay" id="tableModal" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tableModalTitle">
            <div class="modal-titlebar">
                <div class="modal-title" id="tableModalTitle">새 표</div>
                <button class="modal-close" type="button" id="tableModalClose" aria-label="닫기">×</button>
            </div>

            <div class="modal-tabs" role="tablist" aria-label="표 설정">
                <button class="modal-tab is-active" type="button" role="tab" aria-selected="true"
                    data-tab="general">일반</button>
                <button class="modal-tab" type="button" role="tab" aria-selected="false" data-tab="bg">배경 및 제목셀</button>
                <button class="modal-tab" type="button" role="tab" aria-selected="false"
                    data-tab="template">템플릿</button>
            </div>

            <div class="modal-body">
                <div class="tab-pane is-active" data-pane="general">
                    <div class="form-grid">
                        <div class="form-row">
                            <label class="form-label" for="tableRows">가로줄</label>
                            <input class="form-input" id="tableRows" type="number" min="1" max="20" value="3">
                        </div>
                        <div class="form-row">
                            <label class="form-label" for="tableCols">세로줄</label>
                            <input class="form-input" id="tableCols" type="number" min="1" max="12" value="3">
                        </div>

                        <div class="form-row">
                            <label class="form-label" for="tableWidth">너비</label>
                            <div class="form-inline">
                                <input class="form-input" id="tableWidth" type="number" min="0" placeholder="자동">
                                <span class="form-unit">px</span>
                            </div>
                        </div>
                        <div class="form-row">
                            <label class="form-label" for="tableHeight">높이</label>
                            <div class="form-inline">
                                <input class="form-input" id="tableHeight" type="number" min="0" placeholder="자동">
                                <span class="form-unit">px</span>
                            </div>
                        </div>
                    </div>

                    <label class="form-check">
                        <input type="checkbox" id="tableSeparate" checked>
                        <span>표 테두리 / 셀 테두리 분리</span>
                    </label>
                </div>

                <div class="tab-pane" data-pane="bg">
                    <div class="tab-hint">(추가 옵션은 추후 확장 예정)</div>
                </div>
                <div class="tab-pane" data-pane="template">
                    <div class="tab-hint">(추가 옵션은 추후 확장 예정)</div>
                </div>
            </div>

            <div class="modal-footer">
                <div class="modal-footer-spacer"></div>
                <button class="btn btn-primary" type="button" id="tableApply">적용</button>
                <button class="btn" type="button" id="tableCancel">취소</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='doc_editor.js') }}" defer></script>
</body>

</html>
